repositories {
    maven {
        name = "papermc-repo"
        url = "https://repo.papermc.io/repository/maven-public/"
    }
}

base {
    archivesName = "${project.property('project-name')}PaperMC"
}

dependencies {
    compileOnly project(':tools')
    // API Dependencies for compiling the extension
    compileOnly 'io.github.mcpaimon:papermc:2026.0.7-8'

    // Paper API
    compileOnly 'io.papermc.paper:paper-api:26.1.2.build.+'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'template-papermc'
            
            pom {
                name = project.name
                description = "MCPaimon Extension Template PaperMC"
            }
        }
    }
}
